<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Steak Knives and Bagels — ring + blade. Ink on light OS chrome,
       phosphor amber on dark. Transparent ground so every tab bar works. -->
  <style>
    .ring  { stroke: #221c14; }
    .blade { stroke: #a13d21; }
    @media (prefers-color-scheme: dark) {
      .ring  { stroke: #ffb000; }
      .blade { stroke: #ffb000; }
    }
  </style>
  <circle class="ring" cx="14" cy="18" r="8.5" fill="none" stroke-width="5"/>
  <line class="blade" x1="28.5" y1="3.5" x2="15" y2="17" stroke-width="3" stroke-linecap="round"/>
</svg>
