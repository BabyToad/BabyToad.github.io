title: Steak Knives and Bagels
author: Jonas Heinke
description: Personal website showcasing projects and skills
baseurl: ""
url: "https://www.allknivesnobagel.com"

# Collections
collections:
  blog:
    output: true
    permalink: /blog/:title/
  projects:
    output: true
  golden_triangle_parts:
    output: false
  for_want_of_fuel:
    output: true
    permalink: /for-want-of-fuel/:name/
  thoughts:
    output: true
    permalink: /thoughts/:title/

# Most _for_want_of_fuel files carry no layout in front matter — without this
# default they build as bare HTML fragments with no site chrome.
defaults:
  - scope:
      type: for_want_of_fuel
    values:
      layout: for_want_of_fuel

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-last-modified-at

# Posts live in the `blog` collection, not `_posts` — point the main feed at it,
# and park the (empty) default posts feed out of the way.
feed:
  path: "/feed/posts.xml"
  collections:
    blog:
      path: "/feed.xml"

sass:
  sass_dir: assets/css
  style: compressed

exclude:
  - docs/
  - task-dashboard/
  - vendor/
  - README.md
  - LICENSE
  - .gitignore
  - Gemfile
  - Gemfile.lock