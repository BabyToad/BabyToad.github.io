title: Steak Knives and Bagels
author: Jonas Heinke
description: Personal website showcasing projects and skills
baseurl: ""
url: "https://www.allknivesnobagel.com"

# Collections
collections:
  blog:
    output: true
    permalink: /blog/:title/
  projects:
    output: true
  golden_triangle_parts:
    output: false
  for_want_of_fuel:
    output: true
    permalink: /for-want-of-fuel/:name/
  thoughts:
    output: true
    permalink: /thoughts/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-last-modified-at
  - jekyll-katex

# Posts live in the `blog` collection, not `_posts` — point the main feed at it,
# and park the (empty) default posts feed out of the way.
feed:
  path: "/feed/posts.xml"
  collections:
    blog:
      path: "/feed.xml"

katex:
  # Enable KaTeX
  enable: true
  # Enable auto-render extension
  auto_render: true
  # Enable display mode
  display_mode: true

sass:
  sass_dir: assets/css
  style: compressed

exclude:
  - docs/
  - task-dashboard/
  - README.md
  - LICENSE
  - .gitignore
  - Gemfile
  - Gemfile.lock